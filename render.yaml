services:
  # 1. Main Web Application
  - type: web
    name: chor-dakaat-prod
    runtime: docker
    plan: free
    envVars:
      - key: SERVICE_TYPE
        value: web
      # Tell the image to run migrations, optimize, and storage:link automatically
      - key: AUTORUN_ENABLED
        value: "true"
      - key: AUTORUN_LARAVEL_MIGRATION
        value: "true"
      - key: AUTORUN_LARAVEL_STORAGE_LINK
        value: "true"
      - key: AUTORUN_LARAVEL_CONFIG_CACHE
        value: "true"
      - key: AUTORUN_LARAVEL_ROUTE_CACHE
        value: "true"
      - key: AUTORUN_LARAVEL_VIEW_CACHE
        value: "true"
      - key: PHP_OPCACHE_ENABLE
        value: "1"
      # The image listens on 8080 internally — tell Render to use it
      - key: PORT
        value: "8080"
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString
      - key: VITE_REVERB_HOST
        fromService:
          type: web
          name: chor-dakaat-reverb
          property: host

  # 2. Reverb WebSocket Server
  - type: web
    name: chor-dakaat-reverb
    runtime: docker
    plan: free
    # Override the default image entrypoint with our custom reverb script
    dockerCommand: /usr/local/bin/entrypoint.sh
    envVars:
      - key: SERVICE_TYPE
        value: reverb
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString
      - key: REVERB_HOST
        fromService:
          type: web
          name: chor-dakaat-reverb
          property: host

# Shared environment variables
envVarGroups:
  - name: chor-dakaat-configs
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_URL
        sync: false   # Set manually in Render dashboard after first deploy
      - key: DB_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: "chor-dakaat-app"
      - key: REVERB_APP_KEY
        value: "chor-dakaat-key"
      - key: REVERB_APP_SECRET
        value: "chor-dakaat-secret"
      - key: REVERB_SCHEME
        value: https
      - key: REVERB_PORT
        value: "443"
      - key: VITE_REVERB_APP_KEY
        value: "chor-dakaat-key"
      - key: VITE_REVERB_SCHEME
        value: https
      - key: VITE_REVERB_PORT
        value: "443"

# Database
databases:
  - name: chor-dakaat-db-resource
    databaseName: chor_dakaat_prod_db
    user: chor_dakaat_prod_db_user
    plan: free
