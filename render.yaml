services:
  # 1. Main Application (Web + Queue Combined)
  - type: web
    name: chor-dakaat-prod
    runtime: docker
    plan: free
    envVars:
      - key: SERVICE_TYPE
        value: web
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString
      - key: VITE_REVERB_HOST # Required for Vite during Docker build
        fromService:
          type: web
          name: chor-dakaat-reverb
          property: host

  # 2. Reverb WebSocket Server
  - type: web
    name: chor-dakaat-reverb
    runtime: docker
    plan: free
    envVars:
      - key: SERVICE_TYPE
        value: reverb
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString
      - key: REVERB_HOST
        fromService:
          type: web
          name: chor-dakaat-reverb
          property: host

# Shared variables for all services
envVarGroups:
  - name: chor-dakaat-configs
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: "chor-dakaat-app" # Use the ID from your .env
      - key: REVERB_APP_KEY
        value: "chor-dakaat-key" # Use the Key from your .env
      - key: REVERB_APP_SECRET
        value: "chor-dakaat-secret" # Render will create a secure secret for you
      - key: REVERB_SCHEME
        value: https
      - key: REVERB_PORT
        value: 443

# The Database (Expires every 30 days on Free Tier!)
databases:
  - name: chor-dakaat-db-resource
    databaseName: chor_dakaat_prod_db
    user: chor_dakaat_prod_db_user
    plan: free
