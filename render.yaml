services:
  # 1. Web Application
  - type: web
    name: chor-dakaat-prod
    runtime: docker
    plan: free
    envVars:
      - key: SERVICE_TYPE
        value: web
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString

  # 2. Reverb Server
  - type: web
    name: chor-dakaat-reverb
    runtime: docker
    plan: free
    envVars:
      - key: SERVICE_TYPE
        value: reverb
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString

  # 3. Queue Worker
  - type: worker
    name: chor-dakaat-queue
    runtime: docker
    plan: free
    envVars:
      - key: SERVICE_TYPE
        value: queue
      - fromGroup: chor-dakaat-configs
      - key: DATABASE_URL
        fromDatabase:
          name: chor-dakaat-db-resource
          property: connectionString

# (envVarGroups and databases blocks remain the same as previous)
envVarGroups:
  - name: chor-dakaat-configs
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_SCHEME
        value: https
      - key: REVERB_PORT
        value: 443

databases:
  - name: chor-dakaat-db-resource
    databaseName: chor_dakaat_prod_db
    user: chor_dakaat_prod_db_user
    plan: free
